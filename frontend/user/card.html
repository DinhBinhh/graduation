<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiệp Mời</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://unpkg.com/lottie-web@5.12.2/build/player/lottie.min.js"></script>
    <script defer src="./ambient.js"></script>
  </head>
  <body class="card-page">
    <div class="map-wash" aria-hidden="true"></div>
    <div class="arcane-flare" aria-hidden="true"></div>
    <div class="mist-layers" aria-hidden="true">
      <span class="mist mist--one"></span>
      <span class="mist mist--two"></span>
      <span class="mist mist--three"></span>
    </div>
    <div class="sigil-field" aria-hidden="true">
      <span class="sigil sigil--one"></span>
      <span class="sigil sigil--two"></span>
      <span class="sigil sigil--three"></span>
    </div>
    <div class="shadow-passage" aria-hidden="true">
      <span class="shadow-pass shadow-pass--one"></span>
      <span class="shadow-pass shadow-pass--two"></span>
    </div>
    <div class="map-trails" aria-hidden="true">
      <span class="map-trail map-trail--one"></span>
      <span class="map-trail map-trail--two"></span>
      <span class="map-trail map-trail--three"></span>
    </div>
    <div class="footprints" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="magic-dust" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="wand-corner" aria-hidden="true">
      <div id="wand-lottie" class="wand-lottie"></div>
    </div>
    <main class="card-stage">
      <a class="back-link" href="/">Quay lại</a>
      <div class="card-container" id="card-container">
        <div class="card-inside">
          <img id="card-image" class="card-image" alt="Thiệp tốt nghiệp" />
          <div class="card-copy">
            <p class="eyebrow">Invitation</p>
            <h2 id="inside-name"></h2>
            <p id="inside-note">
              Cảm ơn bạn đã đồng hành trong chặng đường tốt nghiệp. Sự hiện diện của bạn sẽ là
              niềm vui rất lớn trong ngày đặc biệt này.
            </p>
          </div>
        </div>

        <div class="card-cover" id="card-cover">
          <img id="cover-image" class="card-cover__image" alt="Bìa thiệp" hidden />
          <div id="cover-fallback" class="card-cover__front" aria-hidden="true"></div>
        </div>
      </div>
      <div class="card-actions">
        <button id="download-card-button" class="secondary-button" type="button">Tải thiệp</button>
      </div>
      <p id="card-feedback" class="feedback" aria-live="polite"></p>

      <section class="wish-panel">
        <div class="wish-panel__copy">
          <p class="eyebrow">Gửi lời chúc</p>
          <h2>Để lại một lời nhắn cho chủ nhân tấm thiệp</h2>
        </div>
        <form id="wish-form" class="wish-form">
          <div class="wish-form__grid">
            <input id="wish-sender-name" name="senderName" type="text" placeholder="Tên của bạn (tùy chọn)" />
            <input id="wish-file-input" name="wishFile" type="file" accept="image/*,video/*" />
          </div>
          <div class="wish-camera">
            <div class="wish-camera__preview-shell">
              <video id="wish-camera-preview" class="wish-camera__preview" playsinline muted hidden></video>
              <img id="wish-image-preview" class="wish-camera__preview" alt="Ảnh vừa chụp" hidden />
            </div>
            <div class="wish-camera__actions">
              <button id="start-camera-button" class="secondary-button" type="button">Mở camera</button>
              <button id="capture-photo-button" class="secondary-button" type="button" disabled>Chụp hình</button>
              <button id="record-video-button" class="secondary-button" type="button" disabled>Quay video</button>
              <button id="stop-recording-button" class="secondary-button" type="button" disabled>Dừng quay</button>
              <button id="clear-capture-button" class="secondary-button" type="button" disabled>Xóa bản ghi</button>
            </div>
            <p id="wish-camera-feedback" class="feedback" aria-live="polite"></p>
          </div>
          <textarea
            id="wish-message"
            name="message"
            rows="5"
            placeholder="Viết lời chúc của bạn ở đây"
          ></textarea>
          <div class="wish-form__actions">
            <button class="primary-button" type="submit">Gửi lời chúc</button>
          </div>
          <p id="wish-feedback" class="feedback" aria-live="polite"></p>
        </form>
      </section>

      <p class="more-cards-link">
        Bạn có thể xem thêm thiệp mọi người ở đây:
        <a href="http://graduation-zpcg.onrender.com/" target="_blank" rel="noreferrer">
          http://graduation-zpcg.onrender.com/
        </a>
      </p>
    </main>

    <div id="scare-overlay" class="scare-overlay" aria-hidden="true">
      <button id="skip-scare-button" class="skip-scare-button" type="button">Tắt video</button>
      <div class="scare-video-frame">
        <video
          id="scare-video"
          class="hidden-video"
          playsinline
          webkit-playsinline
          preload="metadata"
        ></video>
      </div>
    </div>

    <button id="music-toggle" class="music-toggle" type="button" aria-pressed="true">
      Tắt nhạc
    </button>
    <audio id="bg-music" loop preload="auto">
      <source src="/uploads/videos/nhacnen.mp3" type="audio/mpeg" />
    </audio>

    <script src="./card.js"></script>
  </body>
</html>
